name: Refresh Kobo Plus Catalog

# Runs every Sunday at 03:00 UTC, or manually via Actions → Run workflow
on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write   # needed to commit kobo-plus.json back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Kobo Plus catalog
        run: node scripts/fetch-kobo-catalog.js

      - name: Commit updated catalog
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kobo-plus.json
          git diff --cached --quiet \
            || git commit -m "chore: refresh Kobo Plus catalog [skip ci]"
          git push
