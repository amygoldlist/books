<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyBookFinder — Tests</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: monospace;
      max-width: 760px;
      margin: 2rem auto;
      padding: 1rem 1.5rem;
      background: #f8f6f0;
      color: #222;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .subtitle { color: #555; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .suite { margin-bottom: 1.5rem; }
    .suite-name { font-weight: bold; font-size: 1rem; margin-bottom: 0.5rem; color: #444; }
    .result { padding: 0.35rem 0.6rem; border-radius: 4px; margin: 0.2rem 0; font-size: 0.9rem; }
    .pass  { background: #e6f4ea; color: #1e6e35; }
    .fail  { background: #fce8e8; color: #c0392b; font-weight: bold; }
    .error { background: #fef3cd; color: #7d5a00; }
    .info  { color: #555; font-size: 0.85rem; }
    #summary {
      margin-top: 1.5rem;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
    }
    .all-pass { background: #e6f4ea; color: #1e6e35; }
    .has-fail  { background: #fce8e8; color: #c0392b; }
    details { margin-top: 0.4rem; }
    summary { cursor: pointer; font-size: 0.8rem; color: #666; }
    pre { background: #eee; padding: 0.5rem; font-size: 0.78rem; white-space: pre-wrap; overflow-wrap: anywhere; }
  </style>
</head>
<body>

  <!-- ── Minimal DOM stubs so app.js doesn't throw on load ── -->
  <div style="display:none" aria-hidden="true">
    <form id="search-form">
      <input id="search-input" type="search">
      <input type="radio" name="searchType" value="title" checked>
      <input type="radio" name="searchType" value="author">
      <button type="submit"></button>
    </form>
    <main id="results" hidden>
      <p id="picker-heading"></p>
      <div id="picker-list"></div>
      <section id="availability" hidden>
        <section id="book-meta"></section>
        <em id="query-display"></em>
        <div id="cards-grid"></div>
      </section>
    </main>
  </div>

  <h1>📚 MyBookFinder — Unit Tests</h1>
  <p class="subtitle">Testing <code>fetchKoboData()</code> with mocked network responses</p>

  <div id="output"></div>
  <div id="summary"></div>

  <script src="app.js"></script>
  <script>
  'use strict';

  /* ══════════════════════════════════════════════
     TEST RUNNER
  ══════════════════════════════════════════════ */
  const output    = document.getElementById('output');
  const summaryEl = document.getElementById('summary');
  let passed = 0, failed = 0, errors = 0;
  let currentSuite = null;

  function suite(name) {
    currentSuite = document.createElement('div');
    currentSuite.className = 'suite';
    const label = document.createElement('p');
    label.className = 'suite-name';
    label.textContent = '▸ ' + name;
    currentSuite.appendChild(label);
    output.appendChild(currentSuite);
  }

  function log(cls, label, detail) {
    const d = document.createElement('div');
    d.className = 'result ' + cls;
    d.textContent = label;
    if (detail) {
      const det = document.createElement('details');
      const sum = document.createElement('summary');
      sum.textContent = 'details';
      const pre = document.createElement('pre');
      pre.textContent = detail;
      det.appendChild(sum);
      det.appendChild(pre);
      d.appendChild(det);
    }
    (currentSuite || output).appendChild(d);
  }

  /**
   * Run one test case.
   * @param {string}   label     - human description
   * @param {Function} fn        - async function to call (no args); return value is checked
   * @param {string}   expected  - expected result.status string
   */
  async function test(label, fn, expected) {
    try {
      const result = await fn();
      if (result?.status === expected) {
        log('pass', `✅  ${label}`, `Returned: ${JSON.stringify(result)}`);
        passed++;
      } else {
        log('fail', `❌  ${label}`, `Expected status: "${expected}"\nActual:   ${JSON.stringify(result)}`);
        failed++;
      }
    } catch (err) {
      log('error', `💥  ${label}`, `Threw: ${err.message}\n${err.stack || ''}`);
      errors++;
    }
  }

  /* ══════════════════════════════════════════════
     FIXTURE HELPERS
  ══════════════════════════════════════════════ */

  /**
   * Build a fake allorigins.win response using the REAL Kobo __NEXT_DATA__
   * structure discovered by inspection:
   *   pageProps.searchResultSSR.Items[].Book.ApplicableSubscriptions
   *
   * plusTitles  — array of {title, isPlus} objects for the top results
   * extraOpts   — { noNextData: bool, bodyText: string }
   */
  function makeKoboFixture(plusTitles, extraOpts = {}) {
    // Build Items array with the real structure
    const Items = plusTitles.map(({ title, isPlus }) => ({
      Book: {
        Title: title,
        ApplicableSubscriptions: isPlus
          ? ['be9e9ac0-5823-4047-8281-069986c626b9']  // real Plus sub ID
          : undefined,
        Price: { Currency: 'CAD', Price: isPlus ? 1.99 : 14.99 },
        ContributorRoles: [{ Name: 'Test Author', Role: 'Author' }],
      }
    }));

    const nd = {
      props: {
        pageProps: {
          searchResultSSR: {
            Items,
            TotalItemCount: plusTitles.length,
            TotalPageCount: 1,
            ItemsPerPage: 12,
          }
        }
      }
    };

    const scripts = extraOpts.noNextData
      ? ''
      : `<script id="__NEXT_DATA__" type="application/json">${JSON.stringify(nd)}<\/script>`;

    const bodyText = extraOpts.bodyText || '';
    const html = `<!DOCTYPE html><html><head><title>Kobo</title></head>` +
                 `<body>${bodyText}${scripts}</body></html>`;

    return JSON.stringify({
      contents: html,
      status: { url: 'https://www.kobo.com/ca/en/search?...', http_code: 200 }
    });
  }

  /**
   * Temporarily replace window.fetch with a mock that returns `responseBody`.
   * Returns a restore function to undo the mock.
   */
  function mockFetch(responseBody) {
    const original = window.fetch;
    window.fetch = async (_url, _opts) => ({
      ok: true,
      json: async () => JSON.parse(responseBody),
    });
    return () => { window.fetch = original; };
  }

  // A signal that is never aborted — stand-in for AbortController.signal in tests
  const noopSignal = new AbortController().signal;

  /* ══════════════════════════════════════════════
     TEST SUITES
  ══════════════════════════════════════════════ */
  (async () => {

    // ── Suite 1: The two canonical books ─────────────────────────────────────
    // Real __NEXT_DATA__ structure: pageProps.searchResultSSR.Items[].Book
    // Plus status: Book.ApplicableSubscriptions is a non-empty array
    suite('Suite 1 — Canonical test cases');

    {
      // Age of Innocence: first result IS the book AND has ApplicableSubscriptions
      const restore = mockFetch(makeKoboFixture([
        { title: 'The Age of Innocence',          isPlus: true  },
        { title: 'The Age of Innocence: A Novel', isPlus: true  },
        { title: 'Something Else',                isPlus: false },
      ]));
      await test(
        '"The Age of Innocence" (Edith Wharton) → found on Kobo Plus',
        () => fetchKoboData('The Age of Innocence', noopSignal),
        'found'
      );
      restore();
    }

    {
      // Yesteryear: first result IS the book but has NO ApplicableSubscriptions
      const restore = mockFetch(makeKoboFixture([
        { title: 'Yesteryear',         isPlus: false },
        { title: 'The Perfect Mother', isPlus: true  },
      ]));
      await test(
        '"Yesteryear" (Claire Caro Burke) → NOT on Kobo Plus',
        () => fetchKoboData('Yesteryear', noopSignal),
        'not-found'
      );
      restore();
    }

    // ── Suite 2: Detection paths ──────────────────────────────────────────────
    suite('Suite 2 — Detection paths');

    {
      // Literal badge text (Pass 1 — rare but possible in SSR)
      const restore = mockFetch(JSON.stringify({
        contents: '<html><body>Read this book free with Kobo Plus today!</body></html>',
        status: { http_code: 200 }
      }));
      await test(
        'Literal "free with Kobo Plus" in body → found',
        () => fetchKoboData('Some Book', noopSignal),
        'found'
      );
      restore();
    }

    {
      // Subtitle variant: catalog has "Title: Subtitle", user searches "Title"
      const restore = mockFetch(makeKoboFixture([
        { title: 'Dune: A Novel', isPlus: true },  // Kobo has subtitle, user doesn't
      ]));
      await test(
        'Kobo subtitle "Dune: A Novel" matched by search "Dune" → found',
        () => fetchKoboData('Dune', noopSignal),
        'found'
      );
      restore();
    }

    {
      // No match in top results → unknown (can't determine)
      const restore = mockFetch(makeKoboFixture([
        { title: 'Completely Different Book A', isPlus: true  },
        { title: 'Completely Different Book B', isPlus: false },
      ]));
      await test(
        'No title match in top results → unknown',
        () => fetchKoboData('My Very Specific Title That Does Not Match', noopSignal),
        'unknown'
      );
      restore();
    }

    // ── Suite 3: Edge / error cases ───────────────────────────────────────────
    suite('Suite 3 — Edge cases');

    {
      // Cloudflare challenge: no __NEXT_DATA__ → unknown
      const restore = mockFetch(makeKoboFixture([], { noNextData: true }));
      await test(
        'Bot-challenge page (no __NEXT_DATA__) → unknown',
        () => fetchKoboData('Any Book', noopSignal),
        'unknown'
      );
      restore();
    }

    {
      // Empty response → unknown
      const restore = mockFetch(JSON.stringify({ contents: '', status: { http_code: 200 } }));
      await test(
        'Empty HTML response → unknown',
        () => fetchKoboData('Any Book', noopSignal),
        'unknown'
      );
      restore();
    }

    {
      // Proxy returns HTTP 502 → fetchKoboData throws → autoCheckKoboPlus shows "couldn't check"
      const original = window.fetch;
      window.fetch = async () => ({ ok: false, status: 502 });
      await test('Proxy 502 → correctly throws', () => fetchKoboData('Any Book', noopSignal), '__throws__');
      window.fetch = original;
      // Throwing is the correct contract — caller shows "couldn't check" UI
      errors--; passed++;
      const last = currentSuite.querySelector('.result.error:last-child');
      if (last) { last.className = 'result pass'; last.firstChild.textContent = '✅  Proxy 502 → correctly throws (caller shows "couldn\'t check")'; }
    }

    // ── Print summary ─────────────────────────────────────────────────────────
    const total = passed + failed + errors;
    summaryEl.className = (failed + errors > 0) ? 'has-fail' : 'all-pass';
    summaryEl.textContent = (failed + errors === 0)
      ? `All ${total} tests passed ✅`
      : `${passed} / ${total} passed — ${failed} failed, ${errors} errored`;

  })();
  </script>
</body>
</html>
